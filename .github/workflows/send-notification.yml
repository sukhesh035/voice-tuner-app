name: Send Push Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Notification title'
        required: false
        type: string
      body:
        description: 'Notification body'
        required: false
        type: string
      clearBadge:
        description: 'Set to true to send badge=0 to all device tokens (one-off)'
        required: false
        type: boolean

env:
  AWS_REGION: us-east-1

jobs:
  send:
    name: Send notification
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Invoke notifications Lambda
        run: |
          # Build JSON payload. If clearBadge is true, include that flag and
          # omit title/body if not provided. This invokes the Lambda with
          # { clearBadge: true } which will send badge=0 to all tokens.
          PAYLOAD=$(jq -n \
            --argjson cb "${{ inputs.clearBadge }}" \
            --arg t "${{ inputs.title }}" \
            --arg b "${{ inputs.body }}" \
            'reduce ["$cb","$t","$b"] as $i ({}; .) | if $i[0] == "true" then {clearBadge: true} else {title: $i[1], body: $i[2]} end')

          echo "Invoking notifications Lambda with payload: $PAYLOAD"

          aws lambda invoke \
            --function-name sruti-prod-notifications \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json

          echo "Lambda response:"
          cat /tmp/response.json
