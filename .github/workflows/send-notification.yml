name: Send Push Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Notification title'
        required: false
        type: string
      body:
        description: 'Notification body'
        required: false
        type: string
      clearBadge:
        description: 'Set to true to send badge=0 to all device tokens (one-off)'
        required: false
        type: boolean

env:
  AWS_REGION: us-east-1

jobs:
  send:
    name: Send notification
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Invoke notifications Lambda
        run: |
          # Build JSON payload. If clearBadge is true, use a simple static
          # payload. Otherwise build title/body via jq. Using plain bash
          # avoids complex jq expression interpolation issues.
          if [ "${{ inputs.clearBadge }}" = "true" ]; then
            PAYLOAD='{"clearBadge":true}'
          else
            PAYLOAD=$(jq -n --arg t "${{ inputs.title }}" --arg b "${{ inputs.body }}" '{title: $t, body: $b}')
          fi

          echo "Invoking notifications Lambda with payload: $PAYLOAD"

          aws lambda invoke \
            --function-name sruti-prod-notifications \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json

          echo "Lambda response:"
          cat /tmp/response.json
