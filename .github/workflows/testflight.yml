name: TestFlight — iOS

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: testflight-ios
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-26

    environment: prod

    permissions:
      contents: read

    env:
      BUNDLE_ID:     com.sruti.voicetuner
      TEAM_ID:       334BUFYVP9
      SCHEME:        App
      PROJECT:       apps/mobile-app/ios/App/App.xcodeproj
      ARCHIVE_PATH:  /tmp/SwaraAI.xcarchive
      EXPORT_PATH:   /tmp/SwaraAI-export
      EXPORT_PLIST:  /tmp/ExportOptions.plist

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── 2. Select Xcode 26.3 ─────────────────────────────────────────────
      #   Pin to Xcode 26.3 — matches local dev and is a known-good stable
      #   release. Xcode 26.4 on this runner has broken iOS destinations.
      - name: Select Xcode
        run: |
          echo "── Available Xcode versions ──"
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          # Pin to 26.3 — try common naming patterns on GHA runners
          if [ -d "/Applications/Xcode_26.3.app" ]; then
            XCODE="/Applications/Xcode_26.3.app"
          elif [ -d "/Applications/Xcode_26.3.0.app" ]; then
            XCODE="/Applications/Xcode_26.3.0.app"
          else
            echo "::error::Xcode 26.3 not found on runner"
            exit 1
          fi
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"

          echo "── Active Xcode ──"
          xcode-select -p
          xcodebuild -version

      # ── 3. Node + pnpm ─────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4.3.0
        with:
          node-version: 22
          cache: pnpm

      # ── 4. Install JS dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. AWS credentials (for generate-env to read CloudFormation) ───
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── 6. Generate environment.prod.ts from live stack outputs ────────
      - name: Generate environment.prod.ts
        run: pnpm generate-env:prod
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:     ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      # ── 7. Build PWA (production) ──────────────────────────────────────
      - name: Build PWA
        run: pnpm build:mobile

      # ── 8. Create iOS native project ───────────────────────────────────
      #   ios/ is gitignored — regenerated fresh every CI run.
      - name: Add & sync Capacitor iOS platform
        working-directory: apps/mobile-app
        run: |
          ../../node_modules/.bin/cap add ios
          ../../node_modules/.bin/cap sync ios

      # ── 8a. Decode GoogleService-Info.plist (Firebase native SDK) ──────
      #   @capacitor-firebase/analytics auto-calls FirebaseApp.configure()
      #   on iOS, which requires GoogleService-Info.plist in the app bundle.
      #   Download the plist from Firebase Console → Project settings → iOS app,
      #   base64-encode it, and store as GOOGLE_SERVICE_INFO_PLIST_BASE64 secret.
      - name: Decode GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_B64" | base64 --decode \
            > apps/mobile-app/ios/App/App/GoogleService-Info.plist
          echo "── GoogleService-Info.plist written ──"
          plutil -p apps/mobile-app/ios/App/App/GoogleService-Info.plist

      # ── 8b. Create shared Xcode scheme ────────────────────────────────
      #   Capacitor's template does not include a .xcscheme file.
      #   Xcode 26 requires a shared scheme with explicit platform support
      #   for xcodebuild archive -destination "generic/platform=iOS" to work.
      #   We write the scheme XML ourselves so CI is self-contained.
      - name: Create shared Xcode scheme
        run: |
          SCHEMES_DIR="apps/mobile-app/ios/App/App.xcodeproj/xcshareddata/xcschemes"
          mkdir -p "$SCHEMES_DIR"
          cat > "$SCHEMES_DIR/App.xcscheme" << 'ENDSCHEME'
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1600"
             version = "1.7">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "504EC3031FED79650016851F"
                         BuildableName = "App.app"
                         BlueprintName = "App"
                         ReferencedContainer = "container:App.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES">
                <Testables>
                </Testables>
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "504EC3031FED79650016851F"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "504EC3031FED79650016851F"
                      BuildableName = "App.app"
                      BlueprintName = "App"
                      ReferencedContainer = "container:App.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
                <BuildableReference
                   BuildableIdentifier = "primary"
                   BlueprintIdentifier = "504EC3031FED79650016851F"
                   BuildableName = "App.app"
                   BlueprintName = "App"
                   ReferencedContainer = "container:App.xcodeproj">
                </BuildableReference>
             </ArchiveAction>
          </Scheme>
          ENDSCHEME
          echo "── Scheme written ──"
          cat "$SCHEMES_DIR/App.xcscheme"
          echo "── xcodebuild -list ──"
          xcodebuild -project "apps/mobile-app/ios/App/App.xcodeproj" -list

      # ── 8c. Inject MainViewController + patch Main.storyboard & pbxproj ─
      #   The default Capacitor template uses CAPBridgeViewController directly,
      #   which doesn't extend the webView to the screen edges. Our local dev
      #   project has a custom MainViewController subclass that:
      #     1. Sets contentInsetAdjustmentBehavior = .never (edge-to-edge)
      #     2. Forwards real safe-area insets to CSS custom properties
      #   Since ios/ is gitignored, CI must create this file + patch
      #   Main.storyboard and project.pbxproj to reference it.
      #
      #   This step also patches the project-level Release build configuration
      #   to disable code signing for ALL targets by default. SPM dependency
      #   targets (Firebase, GoogleUtilities, etc.) inherit from the project
      #   level and will have signing disabled. The App target's own target-level
      #   Release build config is then patched to re-enable Manual signing with
      #   the correct provisioning profile, so only the App target gets signed.
      #   This is required for Xcode 26 which errors when SPM targets receive
      #   a provisioning profile specifier (they don't support profiles).
      - name: Inject MainViewController & patch storyboard + pbxproj
        run: |
          APP_DIR="apps/mobile-app/ios/App/App"
          PBXPROJ="apps/mobile-app/ios/App/App.xcodeproj/project.pbxproj"

          # ── Create MainViewController.swift ──
          cat > "$APP_DIR/MainViewController.swift" << 'ENDSWIFT'
          import UIKit
          import Capacitor

          class MainViewController: CAPBridgeViewController {

              override func viewDidLoad() {
                  super.viewDidLoad()
                  webView?.scrollView.contentInsetAdjustmentBehavior = .never
              }

              override func viewSafeAreaInsetsDidChange() {
                  super.viewSafeAreaInsetsDidChange()
                  let insets = view.safeAreaInsets
                  bridge?.webView?.evaluateJavaScript("""
                      document.documentElement.style.setProperty('--ion-safe-area-top', '\(insets.top)px');
                      document.documentElement.style.setProperty('--ion-safe-area-bottom', '\(insets.bottom)px');
                      document.documentElement.style.setProperty('--ion-safe-area-left', '\(insets.left)px');
                      document.documentElement.style.setProperty('--ion-safe-area-right', '\(insets.right)px');
                  """, completionHandler: nil)
              }
          }
          ENDSWIFT

          # ── Patch Main.storyboard: use MainViewController ──
          sed -i '' \
            's/customClass="CAPBridgeViewController" customModule="Capacitor"/customClass="MainViewController" customModule="App" customModuleProvider="target"/' \
            "$APP_DIR/Base.lproj/Main.storyboard"

          # ── Patch project.pbxproj ──
          # Use Python for reliable pbxproj text manipulation (macOS has python3)
          python3 << 'ENDPY'
          import re

          pbx_path = "apps/mobile-app/ios/App/App.xcodeproj/project.pbxproj"
          with open(pbx_path, "r") as f:
              content = f.read()

          FILE_REF = "A1B2C3D400000000DEADBEEF"
          BUILD_REF = "A1B2C3D400000001DEADBEEF"
          GSERVICE_FILE_REF = "B1C2D3E4F5A6B7C8D9E0F1A1"
          GSERVICE_BUILD_REF = "B1C2D3E4F5A6B7C8D9E0F1A2"

          # 1) PBXBuildFile section — add after AppDelegate build file
          anchor = '504EC3081FED79650016851F /* AppDelegate.swift in Sources */ = {isa = PBXBuildFile; fileRef = 504EC3071FED79650016851F /* AppDelegate.swift */; };'
          insert_build = f'\t\t{BUILD_REF} /* MainViewController.swift in Sources */ = {{isa = PBXBuildFile; fileRef = {FILE_REF} /* MainViewController.swift */; }};'
          insert_gservice_build = f'\t\t{GSERVICE_BUILD_REF} /* GoogleService-Info.plist in Resources */ = {{isa = PBXBuildFile; fileRef = {GSERVICE_FILE_REF} /* GoogleService-Info.plist */; }};'
          content = content.replace(anchor, anchor + "\n" + insert_build + "\n" + insert_gservice_build)

          # 2) PBXFileReference section — add after AppDelegate file reference
          anchor2 = '504EC3071FED79650016851F /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = AppDelegate.swift; sourceTree = "<group>"; };'
          insert_fileref = f'\t\t{FILE_REF} /* MainViewController.swift */ = {{isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = MainViewController.swift; sourceTree = "<group>"; }};'
          insert_gservice_fileref = f'\t\t{GSERVICE_FILE_REF} /* GoogleService-Info.plist */ = {{isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = "GoogleService-Info.plist"; sourceTree = "<group>"; }};'
          content = content.replace(anchor2, anchor2 + "\n" + insert_fileref + "\n" + insert_gservice_fileref)

          # 3) PBXGroup — add file ref after AppDelegate.swift in the App group children
          group_anchor = '504EC3071FED79650016851F /* AppDelegate.swift */,'
          group_insert = f'\t\t\t\t{FILE_REF} /* MainViewController.swift */,'
          group_insert_gservice = f'\t\t\t\t{GSERVICE_FILE_REF} /* GoogleService-Info.plist */,'
          content = content.replace(group_anchor, group_anchor + "\n" + group_insert + "\n" + group_insert_gservice, 1)

          # 4) PBXSourcesBuildPhase — add after AppDelegate in sources list
          sources_anchor = '504EC3081FED79650016851F /* AppDelegate.swift in Sources */,'
          sources_insert = f'\t\t\t\t{BUILD_REF} /* MainViewController.swift in Sources */,'
          content = content.replace(sources_anchor, sources_anchor + "\n" + sources_insert, 1)

          # 5) PBXResourcesBuildPhase — add GoogleService-Info.plist to resources
          # Find an existing resource entry to anchor on. Capacitor templates include
          # Assets.xcassets and storyboard files in the resources phase. We search for
          # the "Resources" build phase and inject our plist build ref.
          resources_phase_match = re.search(
              r'/\* Resources \*/ = \{[^}]*isa = PBXResourcesBuildPhase;[^}]*files = \(',
              content
          )
          if resources_phase_match:
              insert_pos = resources_phase_match.end()
              resources_inject = f'\n\t\t\t\t{GSERVICE_BUILD_REF} /* GoogleService-Info.plist in Resources */,'
              content = content[:insert_pos] + resources_inject + content[insert_pos:]
              print("Added GoogleService-Info.plist to PBXResourcesBuildPhase")
          else:
              print("WARNING: Could not find PBXResourcesBuildPhase — GoogleService-Info.plist NOT added to resources")

          # ── SPM signing fix ──────────────────────────────────────────────
          # Xcode 26 propagates PROVISIONING_PROFILE_SPECIFIER from the project
          # level to ALL targets including SPM package targets, which don't
          # support provisioning profiles and error out.
          #
          # Fix strategy:
          #   - Patch ProvisioningStyle in PBXProject TargetAttributes to Manual
          #     (Xcode 26 uses this to determine automatic vs manual signing).
          #   - Patch project-level Release XCBuildConfiguration to disable signing.
          #   - Patch App target-level Release XCBuildConfiguration to re-enable
          #     Manual signing with our provisioning profile.

          # Identify project-level vs target-level Release config GUIDs.
          proj_cfg_list_match = re.search(
              r'buildConfigurationList\s*=\s*(\w+)\s*/\*\s*Build configuration list for PBXProject',
              content
          )
          if not proj_cfg_list_match:
              print("ERROR: Could not find project-level buildConfigurationList")
              exit(1)
          proj_cfg_list_guid = proj_cfg_list_match.group(1)
          print(f"Project buildConfigurationList GUID: {proj_cfg_list_guid}")

          proj_cfg_list_block_match = re.search(
              rf'^\s*{proj_cfg_list_guid}\s*/\*.*?\*/\s*=\s*\{{.*?buildConfigurations\s*=\s*\((.*?)\);',
              content, re.DOTALL | re.MULTILINE
          )
          if not proj_cfg_list_block_match:
              print("ERROR: Could not find project XCConfigurationList block")
              exit(1)
          proj_cfg_entries = proj_cfg_list_block_match.group(1)
          proj_release_match = re.search(r'(\w+)\s*/\*\s*Release\s*\*/', proj_cfg_entries)
          if not proj_release_match:
              print("ERROR: Could not find Release config in project XCConfigurationList")
              exit(1)
          proj_release_guid = proj_release_match.group(1)
          print(f"Project-level Release config GUID: {proj_release_guid}")

          target_cfg_list_match = re.search(
              r'buildConfigurationList\s*=\s*(\w+)\s*/\*\s*Build configuration list for PBXNativeTarget',
              content
          )
          if not target_cfg_list_match:
              print("ERROR: Could not find target-level buildConfigurationList")
              exit(1)
          target_cfg_list_guid = target_cfg_list_match.group(1)
          print(f"App target buildConfigurationList GUID: {target_cfg_list_guid}")

          target_cfg_list_block_match = re.search(
              rf'^\s*{target_cfg_list_guid}\s*/\*.*?\*/\s*=\s*\{{.*?buildConfigurations\s*=\s*\((.*?)\);',
              content, re.DOTALL | re.MULTILINE
          )
          if not target_cfg_list_block_match:
              print("ERROR: Could not find App target XCConfigurationList block")
              exit(1)
          target_cfg_entries = target_cfg_list_block_match.group(1)
          target_release_match = re.search(r'(\w+)\s*/\*\s*Release\s*\*/', target_cfg_entries)
          if not target_release_match:
              print("ERROR: Could not find Release config in App target XCConfigurationList")
              exit(1)
          target_release_guid = target_release_match.group(1)
          print(f"App target-level Release config GUID: {target_release_guid}")

          # ── Patch TargetAttributes: ProvisioningStyle ──────────────────
          # The PBXProject section has TargetAttributes with
          #   ProvisioningStyle = Automatic;
          # Xcode 26 uses this as the source of truth. Must be Manual.
          old_provisioning = 'ProvisioningStyle = Automatic;'
          new_provisioning = 'ProvisioningStyle = Manual;'
          if old_provisioning in content:
              content = content.replace(old_provisioning, new_provisioning)
              print("Patched TargetAttributes: ProvisioningStyle = Manual")
          else:
              print("NOTE: ProvisioningStyle = Automatic not found (may already be Manual)")

          def patch_build_settings_v2(content, config_guid, settings_to_inject):
              """
              Upsert key=value pairs into a specific XCBuildConfiguration's buildSettings.
              Replaces existing keys in-place; appends missing keys before closing brace.
              """
              block_start_match = re.search(
                  rf'{config_guid}\s*/\*[^*]*\*/\s*=\s*\{{\s*isa\s*=\s*XCBuildConfiguration',
                  content
              )
              if not block_start_match:
                  print(f"ERROR: Could not find XCBuildConfiguration block for {config_guid}")
                  return content

              bs_start = content.find('buildSettings = {', block_start_match.start())
              if bs_start == -1:
                  print(f"ERROR: No buildSettings in config {config_guid}")
                  return content

              brace_pos = content.index('{', bs_start + len('buildSettings ='))
              depth = 1
              pos = brace_pos + 1
              while pos < len(content) and depth > 0:
                  if content[pos] == '{':
                      depth += 1
                  elif content[pos] == '}':
                      depth -= 1
                  pos += 1
              closing_brace_pos = pos - 1

              # Work on just the region from brace_pos to closing_brace_pos (inclusive)
              before = content[:brace_pos + 1]        # up to and including opening {
              middle = content[brace_pos + 1:closing_brace_pos]  # contents
              after  = content[closing_brace_pos:]    # } and everything after

              keys_to_append = {}
              for key, value in settings_to_inject.items():
                  pattern = rf'(\s+{re.escape(key)}\s*=\s*)[^;]+(;)'
                  replacement = rf'\g<1>{value}\2'
                  new_middle, n = re.subn(pattern, replacement, middle)
                  if n > 0:
                      middle = new_middle
                      print(f"  Replaced {key} = {value}")
                  else:
                      keys_to_append[key] = value

              injection = ''
              for key, value in keys_to_append.items():
                  injection += f'\n\t\t\t\t{key} = {value};'
                  print(f"  Appended {key} = {value}")

              return before + middle + injection + '\n\t\t\t' + after

          # Disable all signing at project level — SPM targets inherit this
          print("Patching project-level Release config:")
          project_release_settings = {
              'CODE_SIGN_IDENTITY':             '""',
              'CODE_SIGN_STYLE':                'Manual',
              'CODE_SIGNING_REQUIRED':          'NO',
              'CODE_SIGNING_ALLOWED':           'NO',
              'PROVISIONING_PROFILE_SPECIFIER': '""',
          }
          content = patch_build_settings_v2(content, proj_release_guid, project_release_settings)
          print("→ project-level Release config: signing disabled")

          # Enable Manual signing on the App target — overrides project defaults
          print("Patching App target-level Release config:")
          target_release_settings = {
              'CODE_SIGN_IDENTITY':             '"Apple Distribution"',
              'CODE_SIGN_STYLE':                'Manual',
              'CODE_SIGNING_REQUIRED':          'YES',
              'CODE_SIGNING_ALLOWED':           'YES',
              'DEVELOPMENT_TEAM':               '"334BUFYVP9"',
              'PROVISIONING_PROFILE_SPECIFIER': '"swara-ai-appstore"',
          }
          content = patch_build_settings_v2(content, target_release_guid, target_release_settings)
          print("→ App target-level Release config: Manual signing with swara-ai-appstore")

          with open(pbx_path, "w") as f:
              f.write(content)

          print("pbxproj patched successfully")
          ENDPY

          echo "── MainViewController.swift ──"
          cat "$APP_DIR/MainViewController.swift"
          echo ""
          echo "── Main.storyboard (patched) ──"
          cat "$APP_DIR/Base.lproj/Main.storyboard"
          echo ""
          echo "── pbxproj MainViewController references ──"
          grep -n "MainViewController" "$PBXPROJ" || echo "WARNING: MainViewController not found in pbxproj!"
          echo ""
          echo "── pbxproj signing settings (Release configs) ──"
          grep -n -E "(CODE_SIGN|PROVISIONING_PROFILE|DEVELOPMENT_TEAM|ProvisioningStyle)" "$PBXPROJ" || true
          echo ""
          echo "── pbxproj GoogleService-Info.plist references ──"
          grep -n "GoogleService-Info" "$PBXPROJ" || echo "WARNING: GoogleService-Info.plist not found in pbxproj!"

      # ── 9. Generate iOS native assets (icons + splash) ─────────────────
      - name: Generate iOS native assets
        run: pnpm cap:generate-assets

      # ── 10. Patch Info.plist ────────────────────────────────────────────
      #   The Capacitor template Info.plist is minimal. We add:
      #   - CFBundleDisplayName
      #   - NSMicrophoneUsageDescription
      #   - NSCameraUsageDescription (profile photo)
      #   - NSPhotoLibraryUsageDescription (profile photo)
      #   - UISupportedInterfaceOrientations~ipad (all 4, App Store requirement)
      #   - ITSAppUsesNonExemptEncryption = false
      #   - UIRequiresFullScreen = true
      #   - UILaunchScreen = {} (empty dict — tells iOS this app supports all
      #     modern screen sizes natively, preventing compatibility scaling)
      - name: Patch Info.plist
        run: |
          PLIST="apps/mobile-app/ios/App/App/Info.plist"

          # Display name
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'Swara AI'" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'Swara AI'" "$PLIST"

          # Microphone permission
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'Swara AI uses the microphone to detect your singing pitch in real time for practice and tuning.'" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Swara AI uses the microphone to detect your singing pitch in real time for practice and tuning.'" "$PLIST"

          # Camera permission (profile photo)
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Swara AI uses the camera to take a profile photo.'" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Swara AI uses the camera to take a profile photo.'" "$PLIST"

          # Photo library permission (profile photo)
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Swara AI accesses your photo library to choose a profile photo.'" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Swara AI accesses your photo library to choose a profile photo.'" "$PLIST"

          # iPad orientations (multitasking requirement)
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationPortraitUpsideDown" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:2 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:3 string UIInterfaceOrientationLandscapeRight" "$PLIST"

          # Export compliance exemption
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"

          # Prevent Display Zoom / compatibility scaling
          /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PLIST"

          # KEY FIX: Add empty UILaunchScreen dictionary.
          # Modern iOS uses this key to determine the app supports all screen
          # sizes natively (edge-to-edge). Without it, iOS may fall back to
          # compatibility mode (letterboxing / Display Zoom) even when
          # UILaunchStoryboardName is set. An empty dict is sufficient —
          # it just tells iOS "this is a modern app, no scaling needed".
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "$PLIST" 2>/dev/null || true

      # ── 11. Set version + build number ─────────────────────────────────
      - name: Set version and build number
        working-directory: apps/mobile-app/ios/App
        run: |
          # Derive marketing version from the git tag (strip leading 'v')
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Tag: $TAG → Version: $VERSION"
          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all ${{ github.run_number }}

      # ── 12. Diagnostics (helps debug if safe-area issue persists) ──────
      - name: Diagnostics — dump build configuration
        run: |
          echo "══════════════════════════════════════════════════════════"
          echo "  Info.plist (after patching)"
          echo "══════════════════════════════════════════════════════════"
          plutil -p apps/mobile-app/ios/App/App/Info.plist

          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  LaunchScreen.storyboard (default Capacitor — NOT replaced)"
          echo "══════════════════════════════════════════════════════════"
          cat apps/mobile-app/ios/App/App/Base.lproj/LaunchScreen.storyboard

          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  Main.storyboard"
          echo "══════════════════════════════════════════════════════════"
          cat apps/mobile-app/ios/App/App/Base.lproj/Main.storyboard

          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  Xcode build settings (key subset)"
          echo "══════════════════════════════════════════════════════════"
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -showBuildSettings 2>/dev/null \
            | grep -E '(TARGETED_DEVICE_FAMILY|IPHONEOS_DEPLOYMENT_TARGET|INFOPLIST_FILE|PRODUCT_BUNDLE_IDENTIFIER|LAUNCH_STORYBOARD_NAME|ASSETCATALOG|MARKETING_VERSION|CURRENT_PROJECT_VERSION)' \
            || true

          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  Assets.xcassets contents"
          echo "══════════════════════════════════════════════════════════"
          find apps/mobile-app/ios/App/App/Assets.xcassets -type f -name '*.json' -exec echo "--- {} ---" \; -exec cat {} \;

      # ── 13. Import Apple Distribution certificate ──────────────────────
      - name: Import code-signing certificate
        env:
          CERT_B64:  ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          KEYCHAIN_PASS=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "$CERT_B64" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      # ── 14. Install provisioning profile ───────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_B64" | base64 --decode > "$PROFILES_DIR/swara-ai-appstore.mobileprovision"

      # ── 15. Write ExportOptions.plist ──────────────────────────────────
      - name: Write ExportOptions.plist
        run: |
          cat > "$EXPORT_PLIST" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>334BUFYVP9</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.sruti.voicetuner</key>
              <string>swara-ai-appstore</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      # ── 16. Archive ────────────────────────────────────────────────────
      #   Signing is fully configured in project.pbxproj by the patch step above:
      #     - Project-level Release config: signing disabled (CODE_SIGNING_ALLOWED=NO)
      #     - App target-level Release config: Manual signing with swara-ai-appstore
      #   SPM dependency targets inherit from the project level → no profile → no error.
      #   We do NOT pass PROVISIONING_PROFILE_SPECIFIER here to avoid re-triggering
      #   the Xcode 26 SPM provisioning profile propagation bug.
      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -skipPackagePluginValidation \
            2>&1 | tee /tmp/xcodebuild-archive.log | xcpretty; \
            STATUS=${PIPESTATUS[0]}; \
            if [ $STATUS -ne 0 ]; then \
              echo ""; \
              echo "── xcodebuild raw output (last 100 lines) ──"; \
              tail -100 /tmp/xcodebuild-archive.log; \
              exit $STATUS; \
            fi

      # ── 17. Export IPA ─────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_PLIST"

      # ── 18. Upload to App Store Connect ────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_KEY_B64:   ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          KEY_DIR=~/.appstoreconnect/private_keys
          mkdir -p "$KEY_DIR"
          echo "$ASC_KEY_B64" | base64 --decode > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          xcrun altool --upload-app \
            -f "$EXPORT_PATH/App.ipa" \
            -t ios \
            --apiKey  "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose \
            2>&1

      # ── 19. Summary ────────────────────────────────────────────────────
      - name: Summary
        if: success()
        run: |
          echo "## TestFlight Build Uploaded" >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ github.ref_name }} (build ${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`"                 >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "Apple takes ~5-15 min to process. Check [App Store Connect](https://appstoreconnect.apple.com)." >> $GITHUB_STEP_SUMMARY

      # ── 20. Slack — success ────────────────────────────────────────────
      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "TestFlight Build Uploaded" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }} (build ${{ github.run_number }})" },
                    { "type": "mrkdwn", "text": "*Platform:*\niOS" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "Apple takes ~5-15 min to process. Check <https://appstoreconnect.apple.com|App Store Connect>." }
                  ]
                }
              ]
            }

      # ── 21. Slack — failure ────────────────────────────────────────────
      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "TestFlight Build Failed" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }} (build ${{ github.run_number }})" },
                    { "type": "mrkdwn", "text": "*Platform:*\niOS" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
