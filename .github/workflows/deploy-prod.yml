name: Deploy — Prod

# Triggers ONLY on direct pushes/merges to the `main` branch.
# Opening or updating a PR does NOT trigger this workflow.
on:
  push:
    branches: [main]

# Never run two prod deployments at the same time — queue instead of cancel
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod         # ← GitHub Environment; secrets are scoped here

    permissions:
      contents: read

    env:
      AWS_REGION: us-east-1
      STAGE:      prod
      STACK_NAME: swara-prod
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── 2. Node + pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4.3.0
        with:
          node-version: 22
          cache: pnpm

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. AWS credentials ───────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 5. CDK bootstrap (idempotent — safe to run every time) ───────────────
      - name: Bootstrap CDK
        working-directory: apps/infra
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          pnpm exec cdk bootstrap aws://${ACCOUNT_ID}/${{ env.AWS_REGION }} --ci

      # ── 5a. Write Gmail credentials to SSM (idempotent) ─────────────────────
      - name: Write Gmail credentials to SSM
        run: |
          aws ssm put-parameter \
            --name "/swara-prod/gmail-user" \
            --value "${{ secrets.GMAIL_USER }}" \
            --type SecureString \
            --overwrite
          aws ssm put-parameter \
            --name "/swara-prod/gmail-app-password" \
            --value "${{ secrets.GMAIL_APP_PASSWORD }}" \
            --type SecureString \
            --overwrite

      # ── 6. Build Lambda bundle ────────────────────────────────────────────────
      - name: Build Lambda bundle
        run: pnpm build:api

      # ── 7. Deploy infra (CloudFormation create-or-update — idempotent) ────────
      - name: Deploy AWS infrastructure
        run: pnpm nx run infra:deploy-prod
        env:
          DEPLOY_PROD: "1"

      # ── 8. Generate environment.prod.ts from live stack outputs ───────────────
      - name: Generate environment.prod.ts
        run: pnpm generate-env:prod
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:     ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      # ── 9. Build PWA ──────────────────────────────────────────────────────────
      - name: Build mobile PWA
        run: pnpm build:mobile

      # ── 10. Read stack outputs ────────────────────────────────────────────────
      - name: Read stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionId'].OutputValue" \
            --output text)
          WEB_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebUrl'].OutputValue" \
            --output text)
          echo "bucket=${BUCKET}"            >> $GITHUB_OUTPUT
          echo "distribution_id=${DIST_ID}" >> $GITHUB_OUTPUT
          echo "web_url=${WEB_URL}"         >> $GITHUB_OUTPUT

      # ── 11. Sync PWA to S3 ────────────────────────────────────────────────────
      - name: Sync to S3
        run: |
          BUILD_DIR=$([ -d dist/apps/mobile-app/browser ] \
            && echo dist/apps/mobile-app/browser \
            || echo dist/apps/mobile-app)

          # Hashed assets — cache forever
          aws s3 sync "${BUILD_DIR}" s3://${{ steps.stack.outputs.bucket }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "ngsw.json" \
            --exclude "ngsw-worker.js" \
            --exclude "manifest.webmanifest"

          # Entry points — never cache
          aws s3 sync "${BUILD_DIR}" s3://${{ steps.stack.outputs.bucket }} \
            --exclude "*" \
            --include "index.html" \
            --include "ngsw.json" \
            --include "ngsw-worker.js" \
            --include "manifest.webmanifest" \
            --cache-control "no-cache,no-store,must-revalidate"

      # ── 12. Invalidate CloudFront ─────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.distribution_id }} \
            --paths "/*"

      # ── 13. Publish live update bundle (Capgo self-hosted) ───────────────────
      #   Zips the freshly-built PWA, uploads it to the updates S3 bucket,
      #   writes manifest.json, and invalidates CloudFront so all installed
      #   native apps pick up the new JS bundle on next foreground.
      #   Version = 1.1.<run_number> — matches the native build number set by
      #   testflight.yml / play-store.yml so versions stay in sync.
      - name: Publish live update
        id: live_update
        run: node scripts/publish-update.mjs prod 1.1.${{ github.run_number }}

      # ── 13a. Mirror live update to legacy sruti-prod bucket ──────────────────
      #   Installed native apps built against the old sruti-prod stack still poll
      #   https://d36pxm4nxhwid8.cloudfront.net/manifest.json for updates.
      #   Mirror the bundle zip and manifest.json there so those devices
      #   self-update to the new swara-prod codebase.
      #   Once all users are on a native build that points to swara-prod this
      #   step can be removed.
      - name: Mirror live update to legacy sruti-prod bucket
        run: |
          VERSION="1.1.${{ github.run_number }}"
          ZIP="dist/update-${VERSION}.zip"
          LEGACY_BUCKET="sruti-prod-updates-use1"
          LEGACY_DIST="E3MNNB9K9P20PT"
          LEGACY_CDN="https://d36pxm4nxhwid8.cloudfront.net"

          # Upload the same zip under the same key
          aws s3 cp "${ZIP}" "s3://${LEGACY_BUCKET}/bundles/${VERSION}.zip" --region us-east-1

          # Write a manifest pointing at the LEGACY CDN url (so the URL resolves)
          echo "{\"version\":\"${VERSION}\",\"url\":\"${LEGACY_CDN}/bundles/${VERSION}.zip\"}" \
            > dist/manifest-legacy.json
          aws s3 cp dist/manifest-legacy.json \
            "s3://${LEGACY_BUCKET}/manifest.json" \
            --region us-east-1 \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

          # Invalidate legacy CloudFront so devices see the new manifest immediately
          aws cloudfront create-invalidation \
            --distribution-id "${LEGACY_DIST}" \
            --paths "/manifest.json" \
            --region us-east-1

      # ── 14. Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "## Prod Deployment Complete"                                         >> $GITHUB_STEP_SUMMARY
          echo ""                                                                     >> $GITHUB_STEP_SUMMARY
          echo "**PWA**: ${{ steps.stack.outputs.web_url }}"                         >> $GITHUB_STEP_SUMMARY
          echo "**Live update**: v1.1.${{ github.run_number }} pushed to all devices" >> $GITHUB_STEP_SUMMARY
          echo "**Privacy Policy**: https://sukhesh035.github.io/voice-tuner-app/privacy-policy.html" >> $GITHUB_STEP_SUMMARY
          echo "**Terms of Service**: https://sukhesh035.github.io/voice-tuner-app/terms-of-service.html" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`"                                   >> $GITHUB_STEP_SUMMARY

      # ── 15. Slack — success ────────────────────────────────────────────────────
      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Prod Deployment Complete" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*PWA:*\n${{ steps.stack.outputs.web_url }}" },
                    { "type": "mrkdwn", "text": "*Live Update:*\nv1.1.${{ github.run_number }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                }
              ]
            }

      # ── 16. Slack — failure ────────────────────────────────────────────────────
      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Prod Deployment Failed" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
