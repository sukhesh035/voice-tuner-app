name: Play Store — Android

on:
  push:
    tags:
      - 'v*'

# Never run two Android builds at the same time — queue instead of cancel
concurrency:
  group: play-store-android
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build & Upload to Play Store (Internal Testing)
    runs-on: ubuntu-latest

    environment: prod

    permissions:
      contents: read

    env:
      APP_ID:       com.swaraai.app

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── 2. Node + pnpm ───────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4.3.0
        with:
          node-version: 22
          cache: pnpm

      # ── 3. Install JS dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. AWS credentials (for generate-env to read CloudFormation outputs) ─
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── 5. Generate environment.prod.ts from live stack outputs ───────────
      - name: Generate environment.prod.ts
        run: pnpm generate-env:prod
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:     ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      # ── 6. Build PWA (production) ─────────────────────────────────────────
      - name: Build PWA
        run: pnpm build:mobile

      # ── 7. Set up Java 21 (required for Capacitor 7 Android build) ─────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      # ── 8. Add & sync Capacitor Android platform ──────────────────────────
      #   android/ is gitignored — regenerated fresh every CI run, same as ios/.
      - name: Add & sync Capacitor Android platform
        working-directory: apps/mobile-app
        run: |
          ../../node_modules/.bin/cap add android
          ../../node_modules/.bin/cap sync android

      # ── 8b. Patch Gradle files (Crashlytics plugin) ───────────────────────
      #   The android/ folder is regenerated by cap sync, so we patch it here.
      #   Adds the Firebase Crashlytics Gradle plugin to root build.gradle and
      #   applies it in app/build.gradle — required to generate the build ID
      #   that prevents Crashlytics from crashing on startup.
      - name: Patch Android Gradle for Crashlytics
        run: node scripts/patch-android.mjs

      # ── 8a. Decode google-services.json (Firebase native SDK) ─────────────
      #   @capacitor-firebase/analytics auto-calls FirebaseApp.configure() on
      #   Android, which requires google-services.json in the app module.
      #   Download from Firebase Console → Project settings → Android app,
      #   base64-encode it, and store as GOOGLE_SERVICES_JSON_BASE64 secret.
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode \
            > apps/mobile-app/android/app/google-services.json
          echo "── google-services.json written ──"
          cat apps/mobile-app/android/app/google-services.json | python3 -m json.tool

      # ── 9. Set version name + version code ────────────────────────────────
      #   versionCode = github.run_number (auto-incrementing, required by Play Store)
      #   versionName = git tag with leading 'v' stripped (e.g. v1.2.0 → 1.2.0)
      - name: Set version name and version code
        working-directory: apps/mobile-app/android
        run: |
          TAG="${{ github.ref_name }}"
          VERSION_NAME="${TAG#v}"
          echo "Tag: $TAG → versionName: $VERSION_NAME"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" app/build.gradle
          echo "── build.gradle versionCode / versionName ──"
          grep -E "(versionCode|versionName)" app/build.gradle

      # ── 10. Decode keystore ───────────────────────────────────────────────
      #   ANDROID_KEYSTORE_BASE64 = base64-encoded .jks / .keystore file
      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > $RUNNER_TEMP/release.keystore

      # ── 11. Build release AAB ─────────────────────────────────────────────
      #   We build an Android App Bundle (.aab) — required for new Play Store apps.
      #   Signing is done inline via Gradle properties passed as flags.
      - name: Build release AAB
        working-directory: apps/mobile-app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon \
            --stacktrace

      # ── 12. Locate AAB ────────────────────────────────────────────────────
      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find apps/mobile-app/android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT
          echo "Found AAB: $AAB"
          ls -lh "$AAB"

      # ── 13. Upload to Play Store (Internal Testing track) ─────────────────
      #   Uses a Python script with google-api-python-client (pre-installed on
      #   ubuntu runners) for reliable uploads with full error reporting.
      #   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON = contents of your service account JSON key.
      - name: Upload to Play Store — Internal Testing
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: ${{ env.APP_ID }}
          AAB_PATH: ${{ steps.aab.outputs.path }}
          RELEASE_NAME: "${{ github.ref_name }} (build ${{ github.run_number }})"
        run: |
          pip install google-api-python-client google-auth --quiet
          python3 << 'PYEOF'
          import json, os, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          sa_json = json.loads(os.environ["GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"])
          package  = os.environ["PACKAGE_NAME"]
          aab_path = os.environ["AAB_PATH"]
          rel_name = os.environ["RELEASE_NAME"]

          print(f"Package:      {package}")
          print(f"AAB:          {aab_path}")
          print(f"Release name: {rel_name}")
          print(f"SA email:     {sa_json.get('client_email', 'MISSING')}")

          credentials = service_account.Credentials.from_service_account_info(
              sa_json, scopes=["https://www.googleapis.com/auth/androidpublisher"]
          )
          service = build("androidpublisher", "v3", credentials=credentials)

          # 1. Create an edit
          edit = service.edits().insert(body={}, packageName=package).execute()
          edit_id = edit["id"]
          print(f"Edit ID:      {edit_id}")

          # 2. Upload the AAB
          media = MediaFileUpload(aab_path, mimetype="application/octet-stream", resumable=True)
          upload = service.edits().bundles().upload(
              packageName=package, editId=edit_id, media_body=media
          ).execute()
          version_code = upload["versionCode"]
          print(f"Uploaded versionCode: {version_code}")

          # 3. Assign to the internal track
          track_body = {
              "track": "internal",
              "releases": [{
                  "name":        rel_name,
                  "versionCodes": [version_code],
                  "status":      "completed",
              }],
          }
          service.edits().tracks().update(
              packageName=package, editId=edit_id, track="internal", body=track_body
          ).execute()
          print("Track updated: internal")

          # 4. Commit the edit
          service.edits().commit(packageName=package, editId=edit_id).execute()
          print("Edit committed — upload complete!")
          PYEOF

      # ── 14. Summary ───────────────────────────────────────────────────────
      - name: Summary
        if: success()
        run: |
          echo "## Play Store Build Uploaded" >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "**Track**: Internal Testing"  >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ github.ref_name }} (build ${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo ""                             >> $GITHUB_STEP_SUMMARY
          echo "Check [Google Play Console](https://play.google.com/console) to manage testers." >> $GITHUB_STEP_SUMMARY

      # ── 15. Slack — success ────────────────────────────────────────────
      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Play Store Build Uploaded" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }} (build ${{ github.run_number }})" },
                    { "type": "mrkdwn", "text": "*Platform:*\nAndroid" },
                    { "type": "mrkdwn", "text": "*Track:*\nInternal Testing" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "Check <https://play.google.com/console|Google Play Console> to manage testers." }
                  ]
                }
              ]
            }

      # ── 16. Slack — failure ────────────────────────────────────────────
      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Play Store Build Failed" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }} (build ${{ github.run_number }})" },
                    { "type": "mrkdwn", "text": "*Platform:*\nAndroid" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
