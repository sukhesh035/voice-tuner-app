<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Create Account</ion-title>
  </ion-toolbar>
  @if (isLoading) {
    <ion-progress-bar type="indeterminate"></ion-progress-bar>
  }
</ion-header>

<ion-content>
  <div class="signup-page">

    <!-- ── Hero ───────────────────────────────────────────────────────── -->
    <div class="signup-hero">
      <div class="signup-logo">🎵</div>
      <div class="signup-title">Swara AI</div>
      <div class="signup-sub">Create your free account</div>
    </div>

    <!-- ── Form ───────────────────────────────────────────────────────── -->
    <div class="signup-form swara-card">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" [(ngModel)]="email"
          placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input class="form-input" [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="password" placeholder="Min 8 characters" autocomplete="new-password" />
          <button class="eye-btn" type="button" (click)="showPass = !showPass">
            <ion-icon [name]="showPass ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      @if (errorMsg) {
        <div class="error-msg">{{ errorMsg }}</div>
      }

      <button class="swara-btn swara-btn--primary signup-btn" (click)="signUp()" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

      <div class="signin-row">
        <span class="signin-label">Already have an account?</span>
        <button class="link-btn" type="button" (click)="goToSignIn()">Sign In</button>
      </div>
    </div>

  </div>
</ion-content>
