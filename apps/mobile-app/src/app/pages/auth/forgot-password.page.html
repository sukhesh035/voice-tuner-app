<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Forgot Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="forgot-page">

    <!-- ── Hero ───────────────────────────────────────────────────────── -->
    <div class="forgot-hero">
      <div class="forgot-icon">🔑</div>
      <div class="forgot-title">Forgot Password?</div>
      <div class="forgot-sub">
        Enter your email and we'll send you a 6-digit code to reset your password.
      </div>
    </div>

    <!-- ── Form ───────────────────────────────────────────────────────── -->
    <div class="forgot-form swara-card">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" [(ngModel)]="email"
          placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

      <button class="swara-btn swara-btn--primary forgot-btn" (click)="sendReset()" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send Reset Code' }}
      </button>
      <button class="swara-btn swara-btn--ghost forgot-btn" (click)="goToSignIn()">
        Back to Sign In
      </button>
    </div>

  </div>
</ion-content>
