<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Reset Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="reset-page">

    <!-- ── Hero ───────────────────────────────────────────────────────────── -->
    <div class="reset-hero">
      <div class="reset-logo">🎵</div>
      <div class="reset-title">Reset Password</div>
      <div class="reset-sub" *ngIf="!done">
        Enter the code we sent to <strong>{{ email }}</strong><br>and choose a new password.
      </div>
    </div>

    <!-- ── Success state ──────────────────────────────────────────────────── -->
    <div *ngIf="done" class="reset-form sruti-card">
      <div class="success-msg big-success">{{ successMsg }}</div>
      <button class="sruti-btn sruti-btn--primary reset-btn" (click)="goToSignIn()">
        Go to Sign In
      </button>
    </div>

    <!-- ── Reset form ─────────────────────────────────────────────────────── -->
    <div *ngIf="!done" class="reset-form sruti-card">
      <div class="form-group">
        <label class="form-label">Reset Code</label>
        <input
          class="form-input code-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          [(ngModel)]="code"
          placeholder="123456"
          autocomplete="one-time-code"
        />
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="password-wrap">
          <input class="form-input" [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="newPassword" placeholder="••••••••" autocomplete="new-password" />
          <button class="eye-btn" type="button" (click)="showPass = !showPass">
            <ion-icon [name]="showPass ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <div class="error-msg"   *ngIf="errorMsg">{{ errorMsg }}</div>
      <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>

      <button class="sruti-btn sruti-btn--primary reset-btn" (click)="submit()" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
      <button class="sruti-btn sruti-btn--ghost reset-btn" (click)="goToSignIn()">
        Back to Sign In
      </button>
    </div>

  </div>
</ion-content>
