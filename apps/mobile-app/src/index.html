<!DOCTYPE html>
<html lang="en" class="ion-palette-dark">
<head>
  <meta charset="utf-8" />
  <title>Swara AI - Indian Classical Music Tuner</title>
  <base href="/" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0f0f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Swara AI" />
  
  <!-- Content Security Policy
       - capacitor: / ionic: are required for Capacitor native bridge
       - 'unsafe-inline' for scripts/styles is required by Ionic/Angular
       - connect-src covers Cognito, API Gateway, Firebase, live-update CDN
  -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self' capacitor: ionic: https:;
      script-src  'self' 'unsafe-inline' capacitor: ionic:;
      style-src   'self' 'unsafe-inline';
      img-src     'self' data: blob: https:;
      media-src   'self' blob: https:;
      font-src    'self' data: https:;
      connect-src 'self' https: wss: capacitor: ionic:;
      frame-src   'none';
      object-src  'none';
    " />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" href="assets/icons/icon-192x192.png" />
</head>
<body>
  <app-root></app-root>
</body>
</html>
